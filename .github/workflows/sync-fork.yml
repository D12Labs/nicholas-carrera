name: Sync fork with upstream

# Keeps this fork in sync with the repository it was forked from.
# Uses the built-in `gh repo sync`, which calls GitHub's merge-upstream API and
# automatically targets this fork's parent repository — no source repo to configure.

on:
  schedule:
    # Run every day at 06:00 UTC. Adjust the cron as needed.
    - cron: '0 6 * * *'
  # Allow running it manually from the Actions tab.
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to sync from upstream'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  sync:
    name: Sync ${{ github.event.inputs.branch || 'main' }} from upstream
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.inputs.branch || 'main' }}
        run: |
          echo "Syncing ${GITHUB_REPOSITORY}@${BRANCH} from its upstream parent..."
          gh repo sync "${GITHUB_REPOSITORY}" --branch "${BRANCH}"
