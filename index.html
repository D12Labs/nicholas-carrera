<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script>
    (function() {
      var t = localStorage.getItem('nico-theme');
      var a = localStorage.getItem('nico-accent');
      if (t) document.documentElement.dataset.theme = t;
      if (a) document.documentElement.style.setProperty('--accent', a);
    })();
  </script>

  <title>Nicholas Carrera — Creative Technologist & UX Designer</title>
  <meta name="description" content="Nicholas Carrera, creative technologist and UX designer based in Chicago. Case studies: AI descriptor-to-geometry research, Caterpillar SSO redesign, Wabash Lights data visualization." />
  <meta property="og:title" content="Nicholas Carrera — Creative Technologist & UX Designer" />
  <meta property="og:description" content="Chicago-based creative technologist and UX designer. Work in AI research, UX design, and creative code." />
  <meta name="twitter:card" content="summary" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js" defer></script>

  <style>
    /* ─── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:       #0a0a0a;
      --fg:       #f0ece4;
      --border:   #2a2a2a;
      --muted:    #555;
      --accent:   #00ff41;

      --space-1:  8px;
      --space-2:  16px;
      --space-3:  24px;
      --space-4:  32px;
      --space-5:  40px;
      --space-6:  48px;
      --space-8:  64px;
      --space-10: 80px;
      --space-12: 96px;

      --mono: 'JetBrains Mono', monospace;
      --max-w: 1200px;
    }

    [data-theme="day"] {
      --bg:     #f0ece4;
      --fg:     #0a0a0a;
      --border: #d0ccc4;
      --muted:  #888;
    }

    /* ─── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 10px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 1.3rem;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }
    a { color: inherit; text-decoration: none; }
    button { all: unset; cursor: pointer; }

    /* ─── GRID ───────────────────────────────────────────────── */
    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 var(--space-8);
    }

    /* ─── HUD ────────────────────────────────────────────────── */
    .hud {
      position: fixed;
      top: var(--space-3);
      right: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-1);
      z-index: 100;
    }
    .color-wheel {
      width: 32px;
      height: 32px;
      position: relative;
      cursor: crosshair;
      user-select: none;
      touch-action: none;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .color-wheel:hover,
    .color-wheel.dragging { opacity: 1; }
    .wheel-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        hsl(0,100%,55%), hsl(30,100%,55%), hsl(60,100%,55%),
        hsl(90,100%,55%), hsl(120,100%,55%), hsl(150,100%,55%),
        hsl(180,100%,55%), hsl(210,100%,55%), hsl(240,100%,55%),
        hsl(270,100%,55%), hsl(300,100%,55%), hsl(330,100%,55%),
        hsl(360,100%,55%)
      );
      -webkit-mask: radial-gradient(circle, transparent 46%, black 46%);
      mask: radial-gradient(circle, transparent 46%, black 46%);
      transition: -webkit-mask 0.1s, mask 0.1s;
    }
    .color-wheel.dragging .wheel-ring {
      -webkit-mask: radial-gradient(circle, transparent 36%, black 36%);
      mask: radial-gradient(circle, transparent 36%, black 36%);
    }
    .wheel-center {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: var(--accent);
      pointer-events: none;
    }
    .hud-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .hud-btn:hover { opacity: 1; }
    .hud-btn svg { width: 20px; height: 20px; }

    /* ─── HEADER ─────────────────────────────────────────────── */
    header {
      padding: var(--space-12) 0 var(--space-8);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: var(--space-4);
    }
    .site-name {
      font-size: clamp(4rem, 8vw, 7.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 0.9;
      text-transform: uppercase;
    }
    .site-role {
      font-size: 1.1rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: var(--space-3);
    }
    .site-meta {
      text-align: right;
      color: var(--muted);
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 2;
    }
    .site-meta a:hover { color: var(--fg); }

    /* ─── INDEX ──────────────────────────────────────────────── */
    .index-section {
      padding: var(--space-8) 0;
      border-bottom: 1px solid var(--border);
    }
    .section-label {
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: var(--space-4);
    }
    .index-list { list-style: none; }
    .index-item {
      display: grid;
      grid-template-columns: 3ch 1fr auto auto;
      gap: var(--space-2);
      align-items: baseline;
      padding: var(--space-2) 0;
      border-top: 1px solid var(--border);
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.1s;
    }
    .index-item:hover { color: var(--muted); }
    .index-item:hover .index-num { color: var(--fg); }
    .index-num { color: var(--muted); font-size: 1.1rem; }
    .index-title { font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; }
    .index-type { color: var(--muted); font-size: 1.1rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .index-year { color: var(--muted); font-size: 1.1rem; }

    /* ─── WORK LIST ──────────────────────────────────────────── */
    .work-section { padding: var(--space-8) 0; }
    .work-list { border-bottom: 1px solid var(--border); }

    .work-item {
      border-top: 1px solid var(--border);
      padding: var(--space-10) 0;
    }

    /* header row */
    .work-header {
      display: grid;
      grid-template-columns: 3ch 1fr auto;
      gap: var(--space-2);
      align-items: start;
      margin-bottom: var(--space-2);
    }
    .work-num { color: var(--muted); font-size: 1rem; padding-top: 0.5em; }
    .work-title {
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1;
      min-width: 0;
    }
    .work-year { color: var(--muted); font-size: 1rem; padding-top: 0.5em; white-space: nowrap; }

    /* sub row */
    .work-sub {
      padding-left: calc(3ch + var(--space-2));
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: var(--space-6);
    }

    /* media rail */
    .work-media {
      padding-left: calc(3ch + var(--space-2));
      display: grid;
      grid-template-columns: repeat(var(--count, 1), 1fr);
      gap: 4px;
      height: 300px;
      margin-bottom: var(--space-4);
    }
    .media-img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .media-placeholder {
      border: 1px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* outcome — elevated lead statement */
    .work-outcome-lead {
      padding-left: calc(3ch + var(--space-2));
      margin: var(--space-5) 0 var(--space-8);
    }
    .work-outcome {
      font-size: clamp(1.4rem, 1.8vw, 1.7rem);
      color: var(--fg);
      line-height: 1.9;
      border-left: 2px solid var(--accent);
      padding-left: var(--space-4);
    }

    /* body — asymmetric: context sidebar | built dominant */
    .work-body {
      padding-left: calc(3ch + var(--space-2));
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: var(--space-6) var(--space-10);
      margin-bottom: var(--space-6);
    }

    .work-label {
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .work-text {
      font-size: 1.2rem;
      color: var(--fg);
      line-height: 1.9;
      opacity: 0.7;
    }
    .work-did .work-text + .work-text {
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px solid var(--border);
    }

    /* stack + links */
    .work-footer {
      padding-left: calc(3ch + var(--space-2));
      display: flex;
      gap: var(--space-6);
      align-items: flex-end;
      flex-wrap: wrap;
      margin-top: var(--space-4);
    }
    .work-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
    }
    .stack-tag {
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 4px 10px;
      color: var(--muted);
    }
    .work-links { display: flex; gap: var(--space-1); flex-wrap: wrap; }
    .link-pill {
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 3px 8px;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .link-pill:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: var(--space-8) 0 var(--space-12);
      margin-top: var(--space-10);
    }
    .footer-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      align-items: end;
    }
    .footer-name {
      font-size: 2.4rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--muted);
      transition: color 0.15s;
    }
    .footer-name:hover { color: var(--fg); }
    .footer-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
    .footer-link {
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.15s;
    }
    .footer-link:hover { color: var(--fg); }

    /* ─── WABASH PROJECT MEDIA ──────────────────────────────── */
    .wabash-media {
      padding-left: calc(3ch + var(--space-2));
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: var(--space-4);
    }
    .wabash-irl-wrap {
      height: 240px;
      overflow: hidden;
      background: #0e0e0e;
    }
    .wabash-irl-wrap video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .wabash-source-wrap {
      height: 80px;
      overflow: hidden;
      background: #000;
      position: relative;
      cursor: pointer;
    }
    .wabash-source-wrap video {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
    }
    .wabash-source-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      transition: background 0.2s;
      cursor: pointer;
    }
    /* Playing: overlay disappears; hover always brings it back */
    .wabash-source-wrap.is-playing .wabash-source-overlay { background: rgba(0,0,0,0); }
    .wabash-source-wrap:hover      .wabash-source-overlay { background: rgba(0,0,0,0.45); }
    /* Idle label: hide after first play */
    .wsrc-idle {
      font-size: 1rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
    }
    .wabash-source-wrap.has-played .wsrc-idle { display: none; }
    /* Controls: hidden until hover */
    .wsrc-controls { display: none; align-items: center; gap: 8px; }
    .wabash-source-wrap.has-played:hover .wsrc-controls { display: flex; }
    .wsrc-btn {
      all: unset;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.22);
      padding: 3px 10px;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }
    .wsrc-btn:hover { color: #fff; border-color: rgba(255,255,255,0.55); }
    .wabash-data {
      padding-left: calc(3ch + var(--space-2));
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: var(--space-6);
      margin-bottom: var(--space-4);
    }
    .wdata-label {
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .weq-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .weq-lhs { font-size: 1.8rem; font-weight: 700; }
    .weq-sep  { font-size: 1.6rem; color: var(--muted); }
    .weq-frac { display: flex; flex-direction: column; align-items: center; }
    .weq-num, .weq-den { font-size: 1.1rem; padding: 3px 8px; white-space: nowrap; }
    .weq-bar  { width: 100%; height: 1px; background: var(--muted); }
    .weq-mult { font-size: 1.3rem; color: var(--muted); }
    .wdata-thresholds { display: flex; flex-direction: column; gap: 5px; }
    .wt-chip {
      font-size: 1rem;
      padding: 3px 8px;
      display: inline-block;
      letter-spacing: 0.04em;
    }
    .wt-renter { background: #0c1520; color: #76ABFB; }
    .wt-stable { background: #141414; color: var(--muted); }
    .wt-owner  { background: #180a00; color: #FF6600; }
    [data-theme="day"] .wt-renter { background: rgba(118, 171, 251, 0.12); color: #2a5aaa; }
    [data-theme="day"] .wt-stable { background: rgba(0, 0, 0, 0.06);       color: var(--muted); }
    [data-theme="day"] .wt-owner  { background: rgba(255, 102, 0, 0.10);   color: #b84400; }
    .wtable { width: 100%; border-collapse: collapse; }
    .wtable th {
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
      padding: 0 10px 8px 0;
      text-align: left;
    }
    .wtable td {
      padding: 5px 10px 5px 0;
      border-bottom: 1px solid #1e1e1e;
      font-size: 1.1rem;
      color: var(--muted);
      vertical-align: middle;
    }
    .wswatch { display: flex; align-items: center; gap: 7px; }
    .wswatch-dot { width: 11px; height: 11px; border-radius: 1px; flex-shrink: 0; }

    /* ─── WABASH P5 LED STRIP ────────────────────────────────── */
    .wabash-p5-wrap {
      width: 100%;
      overflow: hidden;
      line-height: 0;
    }
    .wabash-p5-wrap canvas {
      display: block;
      width: 100% !important;
    }

    /* ─── CAT NDA NOTE ───────────────────────────────────────── */
    .cat-nda {
      padding-left: calc(3ch + var(--space-2));
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: var(--space-4);
    }

    /* ─── URAP DEMO ──────────────────────────────────────────── */
    .urap-demo {
      padding-left: calc(3ch + var(--space-2));
      margin-bottom: var(--space-4);
    }
    .urap-controls {
      display: flex;
      gap: var(--space-4);
      align-items: flex-end;
      margin-bottom: 10px;
    }
    .urap-field {}
    .urap-field-label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .urap-select {
      font-family: var(--mono);
      font-size: 0.85rem;
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 5px 8px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }
    .urap-slider-field { flex: 1; }
    .urap-slider-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .urap-scale-val {
      font-size: 0.85rem;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .urap-range {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      height: 1px;
      background: var(--border);
      outline: none;
      cursor: pointer;
      margin: 8px 0 4px;
      display: block;
    }
    .urap-range::-webkit-slider-thumb {
      appearance: none;
      width: 8px;
      height: 8px;
      background: var(--accent);
      cursor: pointer;
    }
    .urap-range::-moz-range-thumb {
      width: 8px; height: 8px;
      background: var(--accent);
      border: none;
    }
    .urap-scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      color: var(--muted);
    }
    #urap-canvas-wrap canvas { display: block; width: 100%; }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 760px) {
      .header-inner { grid-template-columns: 1fr; }
      .site-meta { text-align: left; }
      .index-item { grid-template-columns: 3ch 1fr auto; }
      .index-type { display: none; }
      .work-body { grid-template-columns: 1fr; }
      .work-footer { flex-direction: column; align-items: flex-start; }
      .footer-inner { grid-template-columns: 1fr; }
      .footer-links { align-items: flex-start; }
      .work-sub,
      .work-outcome-lead,
      .work-media,
      .work-body,
      .work-footer { padding-left: 0; }
      .work-media { grid-template-columns: 1fr; height: auto; }
      .work-media .media-img { height: 200px; }
      .wabash-media { padding-left: 0; }
      .wabash-irl-wrap { height: 200px; }
      .wabash-data { grid-template-columns: 1fr; padding-left: 0; }
      .urap-demo { padding-left: 0; }
    }
  </style>
</head>

<body>

  <!-- HUD -->
  <div class="hud" role="toolbar" aria-label="Site controls">
    <div class="color-wheel" id="color-wheel" role="button" tabindex="0" aria-label="Pick accent color" title="Pick accent color">
      <div class="wheel-ring"></div>
      <div class="wheel-center" id="wheel-center"></div>
    </div>
    <button class="hud-btn" id="theme-toggle" aria-label="Toggle light/dark" title="Toggle light/dark">
      <svg id="icon-night" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg id="icon-day" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>

  <!-- HEADER -->
  <header>
    <div class="container">
      <div class="header-inner">
        <div>
          <h1 class="site-name">Nicholas<br>Carrera</h1>
          <p class="site-role">Creative Technologist &nbsp;&middot;&nbsp; UX Designer &nbsp;&middot;&nbsp; Developer</p>
        </div>
        <div class="site-meta">
          <div>Chicago, IL</div>
          <div>DePaul University</div>
          <div><a href="mailto:niconicocarrera@gmail.com">niconicocarrera@gmail.com</a></div>
        </div>
      </div>
    </div>
  </header>

  <!-- INDEX -->
  <section class="index-section" aria-label="Work index">
    <div class="container">
      <p class="section-label">Selected Work</p>
      <ul class="index-list" id="index-list"></ul>
    </div>
  </section>

  <!-- WORK -->
  <section class="work-section" aria-label="Case studies">
    <div class="container">
      <div class="work-list" id="work-list"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>

    (function () {
      const wrap = document.getElementById('urap-canvas-wrap');
      if (!wrap) return;

      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);
      const ctx = canvas.getContext('2d');

      const PRESETS = {
        smoothness: { freq: 1.2, ampRatio: 0.10, speed: 0.30, harmonics: 1, ys: 1.0 },
        complexity:  { freq: 4.0, ampRatio: 0.28, speed: 1.00, harmonics: 4, ys: 1.0 },
        tension:     { freq: 2.0, ampRatio: 0.18, speed: 0.25, harmonics: 2, ys: 1.6 },
        joyfulness:  { freq: 3.0, ampRatio: 0.32, speed: 1.80, harmonics: 3, ys: 1.0 },
        elegance:    { freq: 0.8, ampRatio: 0.08, speed: 0.50, harmonics: 1, ys: 1.0 },
        dynamism:    { freq: 3.5, ampRatio: 0.25, speed: 2.50, harmonics: 3, ys: 1.0 },
      };

      let descriptor = 'complexity';
      let intensity   = 5;
      let t           = 0;
      let raf;

      const descriptorEl = document.getElementById('urap-descriptor');
      const scaleEl      = document.getElementById('urap-scale');
      const scaleValEl   = document.getElementById('urap-scale-val');

      descriptorEl?.addEventListener('change', e => { descriptor = e.target.value; });
      scaleEl?.addEventListener('input', e => {
        intensity = parseFloat(e.target.value);
        if (scaleValEl) scaleValEl.textContent = intensity.toFixed(1);
      });

      function cssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      }

      function resize() {
        canvas.width  = wrap.offsetWidth;
        canvas.height = 200;
      }

      function draw() {
        const w = canvas.width, h = canvas.height;
        if (!w || !h) { raf = requestAnimationFrame(draw); return; }

        const cx = w / 2, cy = h / 2;
        const R  = Math.min(w * 0.26, h * 0.38);
        const pr = PRESETS[descriptor] || PRESETS.smoothness;
        const iN = (intensity - 1) / 9;
        const amp = pr.ampRatio * iN * R;

        const bg = cssVar('--bg') || '#0a0a0a';
        const fg = cssVar('--fg') || '#f0ece4';

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);

        const SLICES = 16, STACKS = 24;
        ctx.strokeStyle = fg;
        ctx.lineWidth   = 0.6;
        ctx.globalAlpha = 0.45;

        function disp(phi, theta) {
          let d = 0;
          for (let k = 1; k <= pr.harmonics; k++) {
            d += amp * Math.sin(pr.freq * k * phi + pr.freq * theta + t * k) / k;
          }
          return d;
        }

        // Latitude rings
        for (let si = 1; si < SLICES; si++) {
          const phi = (si / SLICES) * Math.PI;
          ctx.beginPath();
          let first = true;
          for (let stj = 0; stj <= STACKS; stj++) {
            const theta = (stj / STACKS) * 2 * Math.PI;
            const r = R + disp(phi, theta);
            const x = cx + r * Math.sin(phi) * Math.cos(theta);
            const y = cy + (r * Math.cos(phi)) * pr.ys;
            first ? (ctx.moveTo(x, y), first = false) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }

        // Longitude arcs (every other to keep it readable)
        for (let stj = 0; stj < STACKS; stj += 2) {
          const theta = (stj / STACKS) * 2 * Math.PI;
          ctx.beginPath();
          let first = true;
          for (let si = 0; si <= SLICES; si++) {
            const phi = (si / SLICES) * Math.PI;
            const r = R + disp(phi, theta);
            const x = cx + r * Math.sin(phi) * Math.cos(theta);
            const y = cy + (r * Math.cos(phi)) * pr.ys;
            first ? (ctx.moveTo(x, y), first = false) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
        t  += pr.speed * 0.016;
        raf = requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      // defer first resize until after paint so offsetWidth is available
      requestAnimationFrame(() => { resize(); cancelAnimationFrame(raf); draw(); });
    })();

    // ─── WABASH SOURCE VIDEO ───────────────────────────────────────────────────

    (function () {

    // ─── WABASH P5 SOURCE ANIMATION ───────────────────────────────────────────
    // Original sketch: 4 rails × 1px × 468px, MULT=10 to make nodes visible at scale.
    // Warm particles (owner-dominant) travel right; cool particles (gentrifying) travel left.
    // Yellow flash on collision. Made responsive and looping for portfolio embed.
    window.addEventListener('load', function () {
      const container = document.getElementById('wabash-p5-wrap');
      if (!container || typeof p5 === 'undefined') return;

      new p5(function (p) {
        const NUM_RAILS  = 4;
        const NODE_COUNT = 468;     // actual LED node count per rail
        const SPACING    = 0;
        const MARGIN     = 0;

        let MULT, RAIL_WIDTH, RAIL_HEIGHT;
        let particles = [], emitters = [];

        // Colors matching original sketch
        const LEFT_COLORS  = ['#FFC8A5', '#FFA85B', '#FF6600', '#E00000']; // owner-dominant
        const RIGHT_COLORS = ['#76ABFB', '#A1A1E0', '#655AD1', '#662BC1']; // gentrifying
        const LEFT_VALUES  = [17, 9, 7, 11];
        const RIGHT_VALUES = [8, 10, 12, 8];

        function getMult() {
          // Scale MULT to fit container width — minimum 3 so rails are clearly visible
          return Math.max(3, Math.round(container.offsetWidth / NODE_COUNT));
        }

        function getRailY(railIndex) {
          return MARGIN + railIndex * (RAIL_HEIGHT + SPACING);
        }

        function buildEmitters() {
          emitters = [];
          particles = [];
          for (let r = 0; r < NUM_RAILS; r++) {
            emitters.push(new Emitter(MARGIN,              r,  1, p.color(LEFT_COLORS[r]),  Math.floor(LEFT_VALUES[r])));
            emitters.push(new Emitter(RAIL_WIDTH - MARGIN, r, -1, p.color(RIGHT_COLORS[r]), Math.floor(RIGHT_VALUES[r])));
          }
        }

        p.setup = function () {
          MULT        = getMult();
          RAIL_WIDTH  = NODE_COUNT * MULT;
          RAIL_HEIGHT = MULT;
          p.createCanvas(RAIL_WIDTH + MARGIN * 2, NUM_RAILS * (RAIL_HEIGHT + SPACING) + MARGIN * 2).parent(container);
          p.frameRate(60);
          p.pixelDensity(1);
          p.noStroke();
          buildEmitters();
        };

        p.windowResized = function () {
          MULT        = getMult();
          RAIL_WIDTH  = NODE_COUNT * MULT;
          RAIL_HEIGHT = MULT;
          p.resizeCanvas(RAIL_WIDTH + MARGIN * 2, NUM_RAILS * (RAIL_HEIGHT + SPACING) + MARGIN * 2);
          buildEmitters();
        };

        p.draw = function () {
          p.clear(); // transparent — site bg shows through

          for (const emitter of emitters) { emitter.maybeEmit(); }

          for (let i = particles.length - 1; i >= 0; i--) {
            const px = particles[i];
            px.update();
            px.display();
            if (px.x < MARGIN || px.x >= RAIL_WIDTH - MARGIN) { particles.splice(i, 1); }
          }

          // Collision flash
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              if (particles[i].rail === particles[j].rail &&
                  p.abs(particles[i].x - particles[j].x) < MULT * 2) {
                p.fill(255, 255, 100);
                p.rect(particles[i].x, getRailY(particles[i].rail), MULT, MULT);
              }
            }
          }

          // Loop: reset emitters when all done and canvas is clear
          const allDone = emitters.every(e => e.emitted >= e.totalToEmit);
          if (allDone && particles.length === 0) { buildEmitters(); }
        };

        class Pixel {
          constructor(x, rail, dir, col) {
            this.x     = x;
            this.rail  = rail;
            this.dir   = dir;
            this.color = col;
            this.speed = p.random(7, 10);
          }
          update()  { this.x += this.dir * this.speed; }
          display() {
            p.fill(this.color);
            p.rect(this.x, getRailY(this.rail), MULT, MULT);
          }
        }

        class Emitter {
          constructor(x, rail, dir, col, targetCount) {
            this.x             = x;
            this.rail          = rail;
            this.dir           = dir;
            this.color         = col;
            this.totalToEmit   = targetCount;
            this.emitted       = 0;
            this.interval      = Math.floor(900 / targetCount);
            this.lastEmitFrame = 0;
          }
          maybeEmit() {
            if (this.emitted < this.totalToEmit &&
                (p.frameCount - this.lastEmitFrame) >= this.interval) {
              particles.push(new Pixel(this.x, this.rail, this.dir, this.color));
              this.emitted++;
              this.lastEmitFrame = p.frameCount;
            }
          }
        }
      });
    });

    // ─── THEME TOGGLE ──────────────────────────────────────────────────────────

    const html      = document.documentElement;
    const themeBtn  = document.getElementById("theme-toggle");
    const iconNight = document.getElementById("icon-night");

    const savedTheme = localStorage.getItem("nico-theme");

    themeBtn.addEventListener("click", () => {
      html.dataset.theme = html.dataset.theme === "night" ? "day" : "night";
      localStorage.setItem("nico-theme", html.dataset.theme);
      syncThemeIcons();
    });

    function syncThemeIcons() {
      const night = html.dataset.theme !== "day";
      iconNight.style.display = night ? "block" : "none";
      iconDay.style.display   = night ? "none"  : "block";
    }

    // ─── COLOR WHEEL ───────────────────────────────────────────────────────────

    const colorWheel  = document.getElementById("color-wheel");
    const wheelCenter = document.getElementById("wheel-center");
    let wheelDragging = false;

    const savedAccent = localStorage.getItem("nico-accent");
    if (savedAccent) wheelCenter.style.background = savedAccent;

    function applyAccentFromEvent(e) {
      const rect = colorWheel.getBoundingClientRect();
      const cx = rect.left + rect.width  / 2;
      const cy = rect.top  + rect.height / 2;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const hue = ((Math.atan2(clientY - cy, clientX - cx) * 180 / Math.PI) + 90 + 360) % 360;
      const color = `hsl(${Math.round(hue)}, 100%, 58%)`;
      html.style.setProperty("--accent", color);
      wheelCenter.style.background = color;
      localStorage.setItem("nico-accent", color);
    }

    colorWheel.addEventListener("mousedown", e => {
      wheelDragging = true;
      colorWheel.classList.add("dragging");
      applyAccentFromEvent(e);
      e.preventDefault();
    });
    document.addEventListener("mousemove", e => { if (wheelDragging) applyAccentFromEvent(e); });
    document.addEventListener("mouseup",   () => {
      if (!wheelDragging) return;
      wheelDragging = false;
      colorWheel.classList.remove("dragging");
    });
    colorWheel.addEventListener("touchstart", e => {
      wheelDragging = true;
      colorWheel.classList.add("dragging");
      applyAccentFromEvent(e);
      e.preventDefault();
    }, { passive: false });
    document.addEventListener("touchmove", e => { if (wheelDragging) applyAccentFromEvent(e); }, { passive: false });
    document.addEventListener("touchend",  () => { wheelDragging = false; colorWheel.classList.remove("dragging"); });
  </script>
</body>
</html>
